urls:
  - https://example.com
outputFormat: markdown
outputDir: ./output
crawlDepth: 0

# Proxy configuration
# proxy:
#   urls:
#     - http://user:pass@host:port
#     - socks5://host:port
#   rotation: recommended  # recommended | per_request | until_failure

# Browser settings
# launcher: chromium          # chromium | firefox
# waitUntil: networkidle      # networkidle | load | domcontentloaded
# pageLoadTimeout: 60         # seconds
# ignoreCors: false
# closeCookieModals: false
# maxScrollHeight: 5000       # pixels (0 = disable)
# ignoreSslErrors: false

# Crawl filtering
# globs:
#   - https://example.com/blog/**
# excludes:
#   - https://example.com/blog/archive/**
# linkSelector: "a[href]"
# keepUrlFragments: false
# respectRobotsTxt: false

# Cookies & headers
# cookies:
#   - name: session
#     value: abc123
#     domain: .example.com
#     path: /
# headers:
#   Authorization: "Bearer token123"
#   X-Custom-Header: value

# Concurrency & retries
# maxConcurrency: 50
# maxRetries: 3
# maxResults: 0               # 0 = unlimited

# Output toggles (save additional formats alongside primary)
# saveRawHtml: false
# saveText: false
# saveJson: false
# saveXml: false
# saveXmlTei: false

# Content extraction (trafilatura)
extraction:
  favorPrecision: true
  includeComments: false
  includeLinks: true
  includeTables: true
  deduplicate: true
