[project]
name = "contextractor-engine"
version = "0.3.5"
description = "Trafilatura extraction wrapper with configurable options"
license = "Apache-2.0"
requires-python = ">=3.12"
readme = "README.md"
authors = [{ name = "Miroslav Sekera", email = "miroslav@glueo.com" }]

[project.urls]
Homepage = "https://contextractor.com"
Repository = "https://github.com/contextractor/contextractor"
Issues = "https://github.com/contextractor/contextractor/issues"
dependencies = [
    "trafilatura>=2.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/contextractor_engine"]
