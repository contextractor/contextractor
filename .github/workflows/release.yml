# Required secrets:
#   NPM_TOKEN — npmjs.com publish token

name: Build and Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x64
          - os: ubuntu-22.04-arm
            platform: linux
            arch: arm64
          - os: macos-15
            platform: darwin
            arch: arm64
          - os: windows-2022
            platform: win
            arch: x64

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --directory apps/contextractor-standalone

      - name: Install PyInstaller (Unix)
        if: matrix.platform != 'win'
        run: uv pip install pyinstaller --python .venv/bin/python

      - name: Install PyInstaller (Windows)
        if: matrix.platform == 'win'
        run: uv pip install pyinstaller --python .venv\Scripts\python.exe
        shell: cmd

      - name: Build binary
        run: uv run python build.py
        working-directory: apps/contextractor-standalone

      - name: Verify binary (Unix)
        if: matrix.platform != 'win'
        run: ./apps/contextractor-standalone/dist/contextractor-${{ matrix.platform }}-${{ matrix.arch }} --help

      - name: Verify binary (Windows)
        if: matrix.platform == 'win'
        run: .\apps\contextractor-standalone\dist\contextractor-${{ matrix.platform }}-${{ matrix.arch }}.exe --help
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: contextractor-${{ matrix.platform }}-${{ matrix.arch }}
          path: apps/contextractor-standalone/dist/contextractor-${{ matrix.platform }}-${{ matrix.arch }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: List binaries
        run: ls -lh binaries/

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: binaries/*
          generate_release_notes: true

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Determine version
        id: version
        run: |
          VERSION="${{ needs.release.outputs.tag }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set package version
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version
        working-directory: apps/contextractor-standalone/npm

      - name: Publish to npm
        run: npm publish --access public --provenance
        working-directory: apps/contextractor-standalone/npm
